<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ subdomain }} | ZX Network</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        body {
            background-color: #f0f2f5;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .stub-card {
            max-width: 500px;
            width: 100%;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            background: white;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="stub-card">
        <!-- Если у вас есть логотип в папке static, он подтянется -->
        <img src="/static/zx_logo.svg" alt="Logo" style="max-height: 60px; margin-bottom: 20px;">
        
        <h2 class="fw-bold text-dark mb-3">Проект {{ subdomain }}</h2>
        <p class="text-muted">
            Данный раздел сайта в настоящее время находится на этапе разработки и тестирования инфраструктуры.
        </p>
        
        <div class="mt-4 p-3 bg-light rounded text-start font-monospace small text-muted">
            <b>System Info:</b><br>
            Node: {{ subdomain }}.zxapps<br>
            Status: Standby<br>
            Secured by ZX Network
        </div>
    </div>

</body>
</html>
