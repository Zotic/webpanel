{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
    <h2 class="fw-bold text-secondary mb-0">Логи</h2>
    
    <div class="d-flex flex-wrap gap-2 flex-grow-1 justify-content-lg-end align-items-center">
        
        <!-- НОВЫЙ ФИЛЬТР: РЕЖИМ ЛОГИРОВАНИЯ -->
        <select id="logMode" class="form-select shadow-sm fw-bold border-primary" style="width: auto; border-radius: 8px;" onchange="fetchLogs()">
            <option value="services" selected>🛠 Службы и Боты</option>
            <option value="syslog">💻 Весь Syslog (Ядро, SSH, Cron)</option>
        </select>
        
        <!-- Выбор количества строк -->
        <select id="logLines" class="form-select shadow-sm" style="width: auto; border-radius: 8px;" onchange="fetchLogs()">
            <option value="100">100 строк</option>
            <option value="300" selected>300 строк</option>
            <option value="500">500 строк</option>
            <option value="1000">1000 строк</option>
        </select>

        <!-- Фильтр уровня логов -->
        <select id="logPriority" class="form-select shadow-sm" style="width: auto; border-radius: 8px;" onchange="fetchLogs()">
            <option value="all">Все уровни</option>
            <option value="error">🔴 Ошибки</option>
            <option value="warning">🟡 Предупреждения</option>
            <option value="info">🔵 Информация</option>
        </select>

        <!-- Всплывающее меню с галочками (Источники) -->
        <div class="dropdown">
            <button class="btn bg-white border shadow-sm dropdown-toggle d-flex align-items-center gap-1" type="button" data-bs-toggle="dropdown" data-bs-auto-close="outside" style="border-radius: 8px;">
                <span class="material-symbols-outlined fs-6 text-secondary">filter_list</span> Источники
            </button>
            <ul class="dropdown-menu p-2 shadow" id="sourceFilterMenu" style="max-height: 350px; overflow-y: auto; width: 260px;">
                <li><span class="text-muted small px-2">Загрузите логи...</span></li>
            </ul>
        </div>
        
        <!-- Поиск -->
        <input type="text" id="logSearch" class="form-control shadow-sm" placeholder="Поиск текста..." style="max-width: 200px; border-radius: 8px;">
        
        <button class="btn btn-primary shadow-sm d-flex align-items-center gap-1" onclick="fetchLogs()" style="border-radius: 8px;">
            <span class="material-symbols-outlined fs-6">refresh</span> Обновить
        </button>
        
        <button id="autoRefreshBtn" class="btn btn-secondary shadow-sm" onclick="toggleAutoRefresh()" style="border-radius: 8px;">
            Авто: ВЫКЛ
        </button>
    </div>
</div>

<!-- Растягиваем карточку до конца экрана с <div class="card border-0 shadow-sm" style="height: calc(100vh - 130px); overflow: hidden;">
    <!-- ДОБАВЛЕН table-responsive -->
    <div class="card-body p-0 h-100 table-responsive">
        <!-- ДОБАВЛЕНО min-width: 800px; чтобы таблица не сжималась на телефоне -->
        <table class="table align-middle mb-0" style="font-size: 0.9rem; min-width: 800px;">
            <thead class="table-dark position-sticky top-0" style="z-index: 10;">
                <tr>
                    <th class="ps-3" style="width: 15%;">Время</th>
                    <th style="width: 10%;">Уровень</th>
                    <th style="width: 15%;">Источник</th>
                    <th class="pe-3" style="width: 60%;">Сообщение</th>
                </tr>
            </thead>
            <tbody id="logsTableBody">
                <tr><td colspan="4" class="text-center py-5 text-muted">Загрузка логов...</td></tr>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/logs.js"></script>
{% endblock %}
